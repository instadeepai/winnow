# Hyperparameter search space for Optuna calibrator tuning.
# Edit ranges here or override from the CLI with --set, e.g.:
#   --set search_space.dropout.high=0.7
#   --set fixed.max_epochs=300

search_space:
  learning_rate:
    type: categorical
    choices: [0.0001, 0.0003, 0.001]
  weight_decay:
    type: categorical
    choices: [0.0001, 0.001]
  n_layers:
    type: int
    low: 1
    high: 2
  n_units:
    type: categorical
    choices: [32, 64, 128]
  dropout:
    type: categorical
    choices: [0.1, 0.2, 0.3]

fixed:
  batch_size: 8192
  max_epochs: 200
  n_iter_no_change: 10
  tol: 0.0001
  seed: 42
  # Use every validation PSM each epoch (no 10k subsample for early stopping).
  val_early_stopping_max_psms: null
