# --- PrimeNovo: compute-features config overrides ---
# Uses the primenovo data_loader from winnow/configs/data_loader/primenovo.yaml.
# Pass via: winnow compute-features --config-dir configs/primenovo
defaults:
  - _self_
  - /residues
  - /calibrator
  - /data_loader: primenovo

dataset:
  spectrum_path_or_directory: null
  predictions_path: null

training_matrix_output_path: null
filter_empty_predictions: true
labelled: true
metadata_output_path: null
