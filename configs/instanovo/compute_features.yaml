# --- InstaNovo: compute-features config overrides ---
# Uses the instanovo data_loader from winnow/configs/data_loader/instanovo.yaml.
# Pass via: winnow compute-features --config-dir configs/instanovo
defaults:
  - _self_
  - /residues
  - /calibrator
  - /data_loader: instanovo

dataset:
  spectrum_path_or_directory: null
  predictions_path: null

training_matrix_output_path: null
filter_empty_predictions: true
labelled: true
metadata_output_path: null
