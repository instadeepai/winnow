# --- InstaNovo model: training config overrides ---
# Uses the default instanovo data_loader from winnow/configs/data_loader/instanovo.yaml.
# Pass via: winnow train --config-dir configs/instanovo
defaults:
  - _self_
  - /residues
  - /calibrator
  - /data_loader: instanovo

dataset:
  spectrum_path_or_directory: null  # Override per organism in Makefile
  predictions_path: null

model_output_dir: null
dataset_output_path: null
irt_regressor_output_path: null
training_history_path: null
features_path: null
val_features_path: null
validation_fraction: 0.1
