# --- MZTab data loading configuration ---
_target_: winnow.datasets.data_loaders.MZTabDatasetLoader

# Whether to load beam predictions. Set to false if you do not have beam predictions or if you only
# need metadata features (e.g., MassErrorFeature, FragmentMatchFeatures, RetentionTimeFeature).
# Defaults to true.
load_beams: true

# When true, add experiment_name + spectrum_id to spectrum data. This maps input spectra
# to search engine output predictions (e.g. Casanovo, InstaNovo). MGF files always receive
# these columns regardless of this setting. Set to false if your parquet/ipc files already
# contain a spectrum_id column.
add_index_cols: true

# MZTab headers keyed by logical names (see loader ``column_mapping`` defaults).
# Spectrum files may include optional ``sequence`` = ground-truth peptide for evaluation (distinct from Casanovo MZTab ``sequence``).
column_mapping:
  predictions: "opt_ms_run[1]_proforma"
  log_probability: "search_engine_score[1]"
  token_scores: "opt_ms_run[1]_aa_scores"
  unmodified_prediction: "sequence"

residue_masses: ${residue_masses}
residue_remapping:  # Used to map Casanovo-specific notations to UNIMOD tokens.
  "M+15.995": "M[UNIMOD:35]"  # Oxidation
  "Q+0.984": "Q[UNIMOD:7]"  # Deamidation
  "N+0.984": "N[UNIMOD:7]"  # Deamidation
  "C+57.021": "C[UNIMOD:4]"  # Carbamidomethylation
  "C[Carbamidomethyl]": "C[UNIMOD:4]"  # Carbamidomethylation
  "M[Oxidation]": "M[UNIMOD:35]"  # Oxidation
  "N[Deamidated]": "N[UNIMOD:7]"  # Deamidation
  "Q[Deamidated]": "Q[UNIMOD:7]"  # Deamidation
  # N-terminal modifications (hyphens are handled automatically during tokenization)
  "[Acetyl]": "[UNIMOD:1]"  # Acetylation
  "[Carbamyl]": "[UNIMOD:5]"  # Carbamylation
  "[Ammonia-loss]": "[UNIMOD:385]"  # Ammonia loss
  "[+42.011]": "[UNIMOD:1]"  # Acetylation
  "[+43.006]": "[UNIMOD:5]"  # Carbamylation
  "[-17.027]": "[UNIMOD:385]"  # Ammonia loss
  "[+25.980265]": "(+25.98)" # Carbamylation & NH3 loss
  "[+43.006-17.027]": "(+25.98)" # Carbamylation & NH3 loss
