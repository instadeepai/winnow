# --- Compute calibration features (no MLP fit / no model save) ---
defaults:
  - _self_
  - residues
  - calibrator
  - data_loader: instanovo  # Options: instanovo, mztab, pointnovo, primenovo, winnow

dataset:
  # Dataset paths (same as train):
  spectrum_path_or_directory: new_helaqc_splits/train.parquet
  predictions_path: new_helaqc_splits/train.csv

# metadata_output_path: results/metadata.csv
# Optional: write a lean numeric Parquet for model training.
training_matrix_output_path: results/helaqc_training_matrix_with_new_splits.parquet
# Drop rows with empty or non-list predictions (same helper as train/predict).
filter_empty_predictions: true
# If true, the dataset must include ground-truth sequence labels.
labelled: true
