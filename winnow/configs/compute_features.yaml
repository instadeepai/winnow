# --- Compute calibration features (no MLP fit / no model save) ---
defaults:
  - _self_
  - residues
  - calibrator
  - data_loader: instanovo  # Options: instanovo, mztab, pointnovo, winnow

dataset:
  # Dataset paths (same as train):
  spectrum_path_or_directory: examples/example_data/spectra.ipc
  predictions_path: examples/example_data/predictions.csv

metadata_output_path: results/metadata.csv
# Optional: write a lean numeric Parquet for model training.
# training_matrix_output_path: results/training_matrix.parquet
# If true, the dataset must include ground-truth sequence labels.
labelled: true
