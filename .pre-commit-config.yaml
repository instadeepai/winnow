default_stages: [pre-commit]

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/PyCQA/flake8
    rev: d93590f5be797aabb60e3b09f2f52dddb02f349f  # frozen: 7.3.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=100
          - --max-cognitive-complexity=15
          - --ignore=E203,E266,E501,W503,F722
        additional_dependencies:
          - pep8-naming==0.13.3
          - flake8-absolute-import==1.0.0.1
          - flake8-bugbear==22.12.6
          - flake8-builtins==2.0.1
          - flake8-class-attributes-order==0.1.3
          - flake8-cognitive-complexity==0.1.0
          - flake8-comprehensions==3.10.1
          - flake8-pytest-style==1.6.0

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: debug-statements # Check for debugger imports
      - id: check-ast # Simply check whether the files parse as valid python
      - id: check-case-conflict # Check for files that would conflict in case-insensitive filesystems
      - id: check-builtin-literals # Require literal syntax when initializing empty or zero Python builtin types
      - id: check-docstring-first # Check a common error of defining a docstring after code
      - id: check-merge-conflict # Check for files that contain merge conflict strings
      - id: check-yaml # Check yaml files
        args: ["--unsafe"]
      - id: end-of-file-fixer # Ensure that a file is either empty, or ends with one newline
      - id: mixed-line-ending # Replace or checks mixed line ending
      - id: trailing-whitespace # This hook trims trailing whitespace

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 3db014c16a9d31997ab8c07a4d61fcce936c8f0d  # frozen: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages:
          - commit-msg
        args: ["ci", "build", "docs", "feat", "fix", "perf", "refactor", "style", "test", "exp", "chore"]

  - repo: https://github.com/pycqa/pydocstyle
    rev: 07f6707e2c5612960347f7c00125620457f490a7  # frozen: 6.3.0
    hooks:
      - id: pydocstyle
        additional_dependencies: ["tomli"]
        args:
          - --convention=google
          - --add-ignore=D100,D104,D105,D107,D417

  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
    hooks:
      - id: codespell
        name: codespell
        description: Checks for common misspellings in text files.
        entry: codespell --skip="*.js,*.html,*.css, *.svg, *.csv" -I .codespell-ignore.txt
        language: python
        types: [text]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 3b3f7c3f57fe9925356faf5fe6230835138be230  # frozen: v0.15.17
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix, --ignore, F722]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'd2823d321df3af8f878f7ee3414dc94d037145b9'  # frozen: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, types-PyYAML]
        args: [--ignore-missing-imports, "--exclude=(notebooks|tests)", --disable-error-code, "name-defined"]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: fe063293315003e95dff96d43c4928f8799a5c62  # frozen: 0.11.21
    hooks:
      - id: uv-lock
