# yaml-language-server: $schema=https://instadeep.aichor.ai/schema/latest/manifest.schema.json
kind: AIchorManifest
apiVersion: 0.2.1
builder:
  image: winnow-koina
  dockerfile: ./Dockerfile.koina
  context: .
  buildArgs:
    USE_CUDA: "true"

spec:
  debug:
      vscode:
        enabled: false
        path: "/aichor/code"
        provider: "github"
  operator: jobset
  image: winnow-koina
  command: /usr/local/bin/entrypoint.koina.sh make hpo-reeval-ablation HPO_RUN_TS=20260514T012035Z KOINA_SERVER_URL=localhost:8500 KOINA_SSL=false # make hpo-reeval-feature-analysis HPO_RUN_TS=20260514T012035Z

  types:
    worker:
      count: 1
      resources:
        cpus: 12
        ramRatio: 9 # >= 2

        accelerators:
          gpu:
            count: 1
            type: gpu
            product: NVIDIA-H100-80GB-HBM3-MIG-3g.40gb
