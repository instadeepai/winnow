# yaml-language-server: $schema=https://instadeep.aichor.ai/schema/latest/manifest.schema.json
kind: AIchorManifest
apiVersion: 0.2.1
builder:
  image: winnow-koina
  dockerfile: ./Dockerfile
  context: .
  buildArgs:
    USE_CUDA: "true"

spec:
  debug:
      vscode:
        enabled: false
        path: "/aichor/code"
        provider: "github"
  operator: jobset
  image: winnow-koina
  command: make analyze-upscored-fps-new-eval
  types:
    worker:
      count: 1
      resources:
        cpus: 6
        ramRatio: 8 # >= 2

        accelerators:
          gpu:
            count: 0
            type: gpu
            product: NVIDIA-H100-80GB-HBM3-MIG-3g.40gb
