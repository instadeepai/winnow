# yaml-language-server: $schema=https://instadeep.aichor.ai/schema/latest/manifest.schema.json
kind: AIchorManifest
apiVersion: 0.2.1
builder:
  image: winnow
  dockerfile: ./Dockerfile
  context: .
  buildArgs:
    USE_CUDA: "true"

spec:
  debug:
      vscode:
        enabled: true # required
        path: "/aichor/code" # Optional, defaults to "code". Refer the absolute path of the binary if not findable in $PATH
        provider: "github" # Optional, vscode tunnel provider. Options are "github" or "microsoft", defaults to "github"
  operator: jobset
  image: winnow
  command: make tests

  types:
    worker:
      count: 1
      resources:
        cpus: 4
        ramRatio: 2 # >= 2

  storage:
    attachExistingPVCs: # optional, array
        - name: "dtu-denovo-s-2e6da747d6d34f62-mass-spec-fo-3010d211a1d447cf"
          mountPoint: "app/fm_mount"
        - name: "dtu-denovo-s-2e6da747d6d34f62-instanovo-ce-f313d8ccd60f4263"
          mountPoint: "app/clean_acfm_mount"
