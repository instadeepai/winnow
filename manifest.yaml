# yaml-language-server: $schema=https://instadeep.aichor.ai/schema/latest/manifest.schema.json
# AIChor manifest for experiments that need a self-hosted Koina inference server.
# Triton/Koina runs in the same pod as the winnow worker (started by entrypoint.koina.sh)
# and is reached over localhost:8500. Override `spec.command` per experiment.
kind: AIchorManifest
apiVersion: 0.2.1
builder:
  image: winnow-koina
  dockerfile: ./Dockerfile.koina
  context: .
  buildArgs:
    USE_CUDA: "true"

spec:
  debug:
      vscode:
        enabled: false
        path: "/aichor/code"
        provider: "github"
  operator: jobset
  image: winnow-koina
  # Point winnow at the in-pod Triton/Koina server started by entrypoint.koina.sh.
  command: make compute_features_PXD019483

  types:
    worker:
      count: 1
      resources:
        cpus: 12
        ramRatio: 9 # >= 2

        accelerators:
          gpu:
            count: 1
            type: gpu
            product: NVIDIA-H100-80GB-HBM3-MIG-3g.40gb
