# yaml-language-server: $schema=https://instadeep.aichor.ai/schema/latest/manifest.schema.json
kind: AIchorManifest
apiVersion: 0.2.1
builder:
  image: winnow-koina
  dockerfile: ./Dockerfile.koina
  context: .
  buildArgs:
    USE_CUDA: "true"

spec:
  debug:
      vscode:
        enabled: true
        path: "/aichor/code"
        provider: "github"
  operator: jobset
  image: winnow-koina
  command: /usr/local/bin/entrypoint.koina.sh make hpo-pipeline KOINA_SERVER_URL=localhost:8500 KOINA_SSL=false

  types:
    worker:
      count: 1
      resources:
        cpus: 8
        ramRatio: 6 # >= 2

        accelerators:
          gpu:
            count: 0
            type: gpu
            product: NVIDIA-H100-80GB-HBM3-MIG-3g.40gb
