# yaml-language-server: $schema=https://instadeep.aichor.ai/schema/latest/manifest.schema.json
kind: AIchorManifest
apiVersion: 0.2.3
builder:
  image: winnow
  dockerfile: ./Dockerfile
  context: .
  buildArgs:
    USE_CUDA: "true"

spec:
  operator: jobset
  image: winnow
  command: >-
    HF_HOME=/runs/huggingface
    uv run python scripts/plm_manuscript_validation.py
    --validation-mode in_domain_split
    --datasets celegans,immuno2
    --max-eval-rows 0
    --split-train-fraction 0.5
    --plm-feature-mode embedding_diagnostics
    --plm-batch-size 128
    --output-dir /runs/plm-validation-indomain-diagnostics
  timeout: "1d"

  types:
    worker:
      count: 1
      resources:
        cpus: 8
        ramRatio: 4 # >= 2
